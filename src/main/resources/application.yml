spring:
  application:
    name: shipment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  mvc:
    throw-exception-if-no-handler-found: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
