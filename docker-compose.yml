services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: paquetrack-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Shipment Service ────────────────────────────────────────────────
  # DESHABILITADO EN LOCAL: Backend ejecuta en host (mvn spring-boot:run o desde IDE)
  # Para activar en Docker (no recomendado en dev), descomentar:
  # shipment-service:
  #   build: .
  #   container_name: paquetrack-shipment
  #   env_file:
  #     - .env
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
  #     DB_USERNAME: ${DB_USERNAME}
  #     DB_PASSWORD: ${DB_PASSWORD}
  #     RABBITMQ_HOST: ${RABBITMQ_HOST}
  #     RABBITMQ_PORT: ${RABBITMQ_PORT}
  #     RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
  #     RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  #     RABBITMQ_VHOST: ${RABBITMQ_VHOST}
  #     RABBITMQ_SSL_ENABLED: ${RABBITMQ_SSL_ENABLED}
  #     SPRING_PROFILES_ACTIVE: docker
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data: